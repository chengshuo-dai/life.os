<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Life.OS - System Transition</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
        @keyframes glitch-text {
            0% { transform: translate(0); text-shadow: none; }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 #00a6e0, -2px 0 #ff00c1; }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .glitch-anim {
            animation: glitch-text 0.2s infinite;
        }
    </style>
</head>
<body class="bg-black overflow-hidden h-screen w-screen flex items-center justify-center">
<!-- Transition Shader -->
<!-- STITCH_SHADER_START:ANIMATION_43 class="absolute inset-0 w-full h-full opacity-60" -->
<div class="absolute inset-0 w-full h-full opacity-60" style="display:block;">
<canvas id="shader-canvas-ANIMATION_43" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_43');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
}

void main() {
    vec2 uv = v_texCoord;
    float time = u_time;
    
    // Split screen into horizontal strips
    float strips = 20.0;
    float stripId = floor(uv.y * strips);
    
    // Randomized horizontal shift per strip
    float shift = (random(vec2(stripId, floor(time * 15.0))) - 0.5) * 0.2;
    
    // Jitter intensity based on time pulse
    float jitter = step(0.8, random(vec2(time, 0.0))) * 0.1;
    uv.x += shift * jitter;
    
    // RGB Split
    float r = random(uv + vec2(0.005, 0.0));
    float g = random(uv);
    float b = random(uv - vec2(0.005, 0.0));
    
    // Core "Breach" color (Cyan/Blue)
    vec3 color = vec3(0.0, 0.65, 0.88);
    
    // Noise layers
    float noise = random(uv + time);
    
    // Combine for a high-intensity digital corruption look
    vec3 finalColor = color * (r + g + b) * 0.5;
    finalColor += noise * 0.1;
    
    // Vertical scanline interference
    finalColor *= 0.8 + 0.2 * sin(uv.y * 500.0 + time * 20.0);
    
    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>
</div>
<!-- STITCH_SHADER_END:ANIMATION_43 -->

<div class="absolute left-10 top-1/2 -translate-y-1/2 flex flex-col gap-1 text-[8px] text-cyan-500/30 font-mono select-none pointer-events-none">
<div>0XFF82_NODE_INIT</div>
<div>MEM_ALLOC_ERROR_RETRY</div>
<div>REALITY_SYNC_99.9%</div>
<div>CORE_DUMP_ACTIVE</div>
<div>ENCRYPT_LAYER_BYPASS</div>
</div>
<script>
        // Simulation of the transition sequence
        const bar = document.getElementById('progress-bar');
        const status = document.getElementById('status-text');
        
        setTimeout(() => {
            bar.style.transform = 'scaleX(1)';
            let p = 0;
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 5) + 1;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    status.innerText = "AUTHENTICATION_COMPLETE_REDIRECTING...";
                } else {
                    status.innerText = `Syncing Destiny Strata... ${p}%`;
                }
            }, 50);
        }, 500);

        // Auto-redirect simulation logic for the user to "feel" the transition
        // In a real app, this would be a route change.
    </script>
</body>

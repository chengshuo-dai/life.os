<script>
        // Typewriter Effect
        const text = "凌晨三点的急诊室，只有除颤仪充电的啸叫声。";
        const target = document.getElementById('narrative-text');
        let index = 0;

        function type() {
            if (index < text.length) {
                target.innerHTML += text.charAt(index);
                index++;
                setTimeout(type, 100);
            }
        }

        // Fluctuating Vital Signs
        function updateVitals() {
            const hr = document.getElementById('heart-rate');
            const spo2 = document.getElementById('spo2');
            
            setInterval(() => {
                const currentHR = parseInt(hr.innerText);
                const currentSP = parseInt(spo2.innerText);
                
                hr.innerText = Math.max(130, Math.min(165, currentHR + (Math.random() > 0.5 ? 2 : -2)));
                spo2.innerText = Math.max(82, Math.min(91, currentSP + (Math.random() > 0.5 ? 1 : -1)));
            }, 800);
        }

        window.onload = () => {
            setTimeout(type, 1000);
            updateVitals();
        };

        // Micro-interaction for hover glow
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
